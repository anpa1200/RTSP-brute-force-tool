name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  debian-package:
    runs-on: ubuntu-latest
    container: debian:testing-slim
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y build-essential debhelper dh-python pybuild-plugin-pyproject python3-all python3-pytest python3-setuptools lintian
      - run: dpkg-buildpackage -us -uc -b
      - run: lintian ../rtsp-brute-force-tool_*_all.deb
